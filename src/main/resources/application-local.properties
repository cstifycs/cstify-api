spring.application.name=pg-api

server.port=7100
server.forward-headers-strategy=framework

spring.mvc.static-path-pattern=/static/**
spring.web.resources.add-mappings=true

spring.threads.virtual.enabled=true

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

###############################
# database
###############################
server.tomcat.accesslog.enabled=false
spring.datasource.url=
#spring.datasource.driverClassName=org.postgresql.Driver
#spring.datasource.url=jdbc:log4jdbc:postgresql://new-gift-db.ce9a6cmqgmbx.us-east-1.rds.amazonaws.com:5432/gift_db
#spring.datasource.url=jdbc:postgresql://new-gift-db.ce9a6cmqgmbx.us-east-1.rds.amazonaws.com:5432/gift_db
spring.datasource.driverClassName=net.sf.log4jdbc.sql.jdbcapi.DriverSpy
spring.datasource.username=
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=2000
#spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.leak-detection-threshold=20000

spring.datasource.hikari.data-source-properties.prepareThreshold=3
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=256
spring.datasource.hikari.data-source-properties.preparedStatementCacheSizeMiB=5

#logging.level.com.zaxxer.hikari.HikariConfig=DEBUG
#logging.level.com.zaxxer.hikari=TRACE

###############################
# MyBatis
###############################
mybatis.config-location=classpath:mybatis-config.xml
#mybatis.mapper-locations=classpath:mapper/*.xml
#mybatis.type-aliases-package=com.cstify.common.vo,com.snc.gift.vo,com.snc.gift.domain,com.snc.gift.dto
#mybatis.configuration.map-underscore-to-camel-case=true
#mybatis.configuration.call-setters-on-nulls=true
#mybatis.configuration.jdbc-type-for-null=null

###############################
# logging
###############################
logging.config=classpath:logback.xml
logging.level.jdbc.sqlonly=info
logging.level.jdbc.sqltiming=off
logging.level.jdbc.resultsettable=off
logging.level.jdbc.audit=off
logging.level.jdbc.resultset=off
logging.level.jdbc.connection=off

###############################
# swagger
###############################
springdoc.packages-to-scan=com.snc
#springdoc.paths-to-match=/**
springdoc.default-consumes-media-type=application/json;charset=UTF-8
springdoc.default-produces-media-type=application/json;charset=UTF-8
springdoc.swagger-ui.path=/
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.api-docs.path=/api-docs
springdoc.api-docs.groups.enabled=true
#springdoc.show-login-endpoint=true
#springdoc.cache.disabled=true

###############################
# JWT
###############################
security.token.issuer=snc
security.token.key=
security.token.access.validity=30000
security.token.refresh.validity=60000
security.token.redis.ttl=60000
security.token.redis.ttl.throttle-interval=600

###############################
# Redis -- host.docker.internal
###############################
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000
spring.data.redis.lettuce.pool.max-active=50
spring.data.redis.lettuce.pool.max-idle=20
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=3000

#############################
# AWS
#############################
aws.accessKey=
aws.secretKey=
aws.s3.bucketName=
aws.s3.domain=

#############################
# 파일 관련
#############################
file.path.root=c:/upload
file.image.url=http://localhost:7100/api/images/
